kind = "web"
previewPath = "/"
title = "LeagueVerse"
version = "1.0.0"
id = "artifacts/leagueverse"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20253

[services.development]
run = "pnpm --filter @workspace/leagueverse run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/leagueverse", "run", "build" ]
publicDir = "artifacts/leagueverse/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20253"
BASE_PATH = "/"
